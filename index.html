<!DOCTYPE html>
<html>
<head>
    <title>Bullet Dash - Difficulty Selection</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { border: 4px solid #00ffcc; background: #222; margin-top: 20px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        .menu-overlay { position: absolute; top: 120px; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #00ffcc; border-radius: 15px; text-align: center; z-index: 10; }
        button { padding: 12px 25px; font-size: 20px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        .btn-easy { background: #44ff44; color: #000; }
        .btn-medium { background: #ffff44; color: #000; }
        .btn-hard { background: #ff8844; color: #000; }
        .btn-extreme { background: #ff4444; color: white; box-shadow: 0 0 15px #ff4444; }
        button:hover { transform: scale(1.1); filter: brightness(1.2); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>BULLET DASH</h1>

    <div id="menu" class="menu-overlay">
        <h2 style="color: #00ffcc; margin-top: 0;">SELECT DIFFICULTY</h2>
        <button class="btn-easy" onclick="startGame('easy')">EASY</button>
        <button class="btn-medium" onclick="startGame('medium')">MEDIUM</button>
        <button class="btn-hard" onclick="startGame('hard')">HARD</button>
        <button class="btn-extreme" onclick="startGame('extreme')">EXTREME</button>
    </div>

    <canvas id="game" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const menu = document.getElementById('menu');
        
        const shootSound = new Audio('laserShoot.wav');
        const hurtSound = new Audio('hitHurt.wav');
        const explosionSound = new Audio('explosion.wav');
        const jumpSound = new Audio('jump.wav');

        let gameState = "MENU"; 
        let gameFrame = 0;
        let score = 0;
        
        let diffSettings = { 
            spawnRate: 100, 
            baseSpeed: 5, 
            gravity: 1.2, // Tinalasan ang default para mas snappy
            jumpForce: -20,
            bulletSpeed: 15
        };

        let player = { x: 100, y: 300, w: 40, h: 40, velocityY: 0, grounded: false, color: "#00ffcc" };
        let bullets = [];
        let enemies = [];

        function startGame(level) {
            if (level === 'easy') { 
                diffSettings = { spawnRate: 100, baseSpeed: 10, gravity: 1.2, jumpForce: -25, bulletSpeed: 15 }; 
            }
            else if (level === 'medium') { 
                diffSettings = { spawnRate: 70, baseSpeed: 8, gravity: 1.5, jumpForce: -25, bulletSpeed: 18 }; 
            }
            else if (level === 'hard') { 
                diffSettings = { spawnRate: 40, baseSpeed: 13, gravity: 2.0, jumpForce: -28, bulletSpeed: 22 }; 
            }
            else if (level === 'extreme') { 
                // DITO ANG "INSTANT" JUMP: Sobrang taas ng Jump at Gravity para kidlat sa bilis
                diffSettings = { spawnRate: 20, baseSpeed: 18, gravity: 3.5, jumpForce: -40, bulletSpeed: 25 }; 
            }

            resetGame();
            gameState = "PLAYING";
            menu.classList.add('hidden'); 
        }

        function resetGame() {
            score = 0;
            gameFrame = 0;
            bullets = [];
            enemies = [];
            player.y = 300;
            player.velocityY = 0;
            player.grounded = true;
        }

        window.addEventListener('keydown', e => {
            if (e.code === 'Space' && player.grounded && gameState === "PLAYING") {
                player.velocityY = diffSettings.jumpForce; // Instant push pataas
                player.grounded = false;
                jumpSound.currentTime = 0;
                jumpSound.play();
            }
            if (e.code === 'Enter' && gameState === "GAMEOVER") {
                gameState = "MENU";
                menu.classList.remove('hidden');
            }
        });

        window.addEventListener('mousedown', () => {
            if (gameState === "PLAYING") {
                bullets.push({ x: player.x + player.w, y: player.y + 15, w: 25, h: 6, speed: diffSettings.bulletSpeed });
                shootSound.currentTime = 0; 
                shootSound.play();
            }
        });

        function update() {
            if (gameState !== "PLAYING") return;

            gameFrame++;
            
            // Physics Update
            player.velocityY += diffSettings.gravity;
            player.y += player.velocityY;

            if (player.y > 300) { 
                player.y = 300; 
                player.velocityY = 0; 
                player.grounded = true; 
            }

            // Bullet Logic
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].speed;
                if (bullets[i].x > canvas.width) bullets.splice(i, 1);
            }

            // Enemy Spawner
            if (gameFrame % diffSettings.spawnRate === 0) {
                enemies.push({ 
                    x: canvas.width, 
                    y: 310, 
                    w: 30, 
                    h: 30, 
                    speed: diffSettings.baseSpeed + (score / 100)
                });
            }

            // Enemy Logic
            for (let ei = enemies.length - 1; ei >= 0; ei--) {
                let en = enemies[ei];
                en.x -= en.speed;
                
                if (player.x < en.x + en.w && player.x + player.w > en.x && 
                    player.y < en.y + en.h && player.y + player.h > en.y) {
                    hurtSound.currentTime = 0;
                    hurtSound.play();
                    gameState = "GAMEOVER";
                }
                
                for (let bi = bullets.length - 1; bi >= 0; bi--) {
                    let b = bullets[bi];
                    if (b.x < en.x + en.w && b.x + b.w > en.x && b.y < en.y + en.h && b.y + b.h > en.y) {
                        explosionSound.currentTime = 0;
                        explosionSound.play();
                        enemies.splice(ei, 1);
                        bullets.splice(bi, 1);
                        score += 10;
                        break;
                    }
                }
                if (en && en.x + en.w < 0) enemies.splice(ei, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#555";
            ctx.strokeRect(0, 340, 800, 2);

            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15; ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.shadowBlur = 0;

            ctx.fillStyle = "yellow";
            bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
            ctx.fillStyle = "#ff4444";
            enemies.forEach(en => ctx.fillRect(en.x, en.y, en.w, en.h));

            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 20, 30);

            if (gameState === "GAMEOVER") {
                ctx.fillStyle = "rgba(0,0,0,0.85)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "40px Arial";
                ctx.fillText("GAME OVER", canvas.width/2, 180);
                ctx.fillStyle = "#00ffcc";
                ctx.font = "20px Arial";
                ctx.fillText("Press ENTER to Restart", canvas.width/2, 280);
                ctx.textAlign = "start";
            }
            update();
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
